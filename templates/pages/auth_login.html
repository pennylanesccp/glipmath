<style>
    :root {
        --gm-bg: #f8fafc;
        --gm-surface: rgba(255, 255, 255, 0.96);
        --gm-border: rgba(148, 163, 184, 0.22);
        --gm-shadow-card: 0 24px 64px rgba(15, 23, 42, 0.10);
        --gm-shadow-soft: 0 10px 30px rgba(15, 23, 42, 0.12);

        --gsi-bg: #ffffff;
        --gsi-border: #747775;
        --gsi-text: #1f1f1f;
        --gsi-state-hover: rgba(60, 64, 67, 0.08);
        --gsi-state-focus: rgba(60, 64, 67, 0.12);
        --gsi-state-active: rgba(60, 64, 67, 0.16);
    }

    [data-testid="stSidebar"],
    [data-testid="collapsedControl"],
    [data-testid="stToolbar"],
    [data-testid="stStatusWidget"],
    [data-testid="stHeader"] {
        display: none !important;
    }

    [data-testid="stAppViewContainer"] {
        background:
            radial-gradient(circle at top, rgba(79, 70, 229, 0.12), transparent 28%),
            linear-gradient(180deg, var(--gm-bg) 0%, var(--gm-bg) 100%);
    }

    .block-container {
        max-width: 480px;
        padding: 14px 18px 18px;
    }

    @media (max-width: 420px) {
        .block-container {
            padding: 12px 14px 16px;
        }
    }

    .gm-login-shell {
        min-height: calc(100vh - 36px);
        display: flex;
        flex-direction: column;
    }

    .gm-login-card {
        background: var(--gm-surface);
        border: 1px solid var(--gm-border);
        border-radius: 28px;
        box-shadow: var(--gm-shadow-card);
        padding: 28px 22px 22px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        backdrop-filter: blur(12px);
        margin-top: 18px;
    }

    .gm-logo {
        display: block;
        width: 100%;
        max-width: 320px;
        height: auto;
    }

    .st-key-gm_login_google_button {
        margin-top: -92px;
        padding: 0 22px 0;
        position: relative;
        z-index: 2;
    }

    .st-key-gm_login_google_button button {
        background-color: var(--gsi-bg);
        border: 1px solid var(--gsi-border);
        border-radius: 999px;
        box-shadow: var(--gm-shadow-soft);
        color: var(--gsi-text);
        font-family: "Roboto", Arial, sans-serif;
        font-size: 13px;
        font-weight: 400;
        height: 42px;
        letter-spacing: 0.25px;
        transition: box-shadow .18s ease, transform .18s ease, opacity .18s ease;
    }

    .st-key-gm_login_google_button button:hover {
        border-color: var(--gsi-border);
        box-shadow: 0 14px 28px rgba(15, 23, 42, 0.18);
        color: var(--gsi-text);
        transform: translateY(-1px);
    }

    .st-key-gm_login_google_button button:active {
        transform: translateY(1px);
    }

    .st-key-gm_login_google_button button:disabled {
        cursor: default;
        opacity: 0.58;
    }

    .gm-login-footnote {
        color: #64748b;
        font-family: "Roboto", Arial, sans-serif;
        font-size: 0.8rem;
        line-height: 1.5;
        margin-top: auto;
        padding: 18px 10px 4px;
        text-align: center;
    }

    .gm-login-footnote a {
        color: #2563eb;
        text-decoration: none;
    }

    .gm-login-footnote a:hover,
    .gm-login-footnote a:focus-visible {
        text-decoration: underline;
    }

    @media (max-width: 420px) {
        .gm-login-card {
            border-radius: 24px;
            padding: 24px 18px 18px;
            gap: 16px;
            margin-top: 14px;
        }

        .gm-logo {
            max-width: 280px;
        }

        .st-key-gm_login_google_button {
            margin-top: -88px;
            padding: 0 18px 0;
        }

        .gm-login-footnote {
            font-size: 0.76rem;
            padding-top: 16px;
        }
    }
</style>

<section class="gm-login-shell">
    <div class="gm-login-card">
        <img
            class="gm-logo"
            src="{{LOGO_DATA_URI}}"
            alt="GlipTec"
        />
    </div>

    <p class="gm-login-footnote">
        Este app pode conter erros. Caso alguma inconsistência seja encontrada, reporte para
        <a href="mailto:felipeproenca97@gmail.com">felipeproenca97@gmail.com</a>.
    </p>
</section>
