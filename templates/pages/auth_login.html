<style>
    :root {
        --gm-bg: #f8fafc;
        --gm-surface: rgba(255, 255, 255, 0.96);
        --gm-border: rgba(148, 163, 184, 0.22);
        --gm-shadow-card: 0 24px 64px rgba(15, 23, 42, 0.10);
        --gm-shadow-soft: 0 10px 30px rgba(15, 23, 42, 0.12);

        --gsi-bg: #ffffff;
        --gsi-border: #747775;
        --gsi-text: #1f1f1f;
        --gsi-state-hover: rgba(60, 64, 67, 0.08);
        --gsi-state-focus: rgba(60, 64, 67, 0.12);
        --gsi-state-active: rgba(60, 64, 67, 0.16);
    }

    [data-testid="stSidebar"],
    [data-testid="collapsedControl"],
    [data-testid="stToolbar"],
    [data-testid="stStatusWidget"],
    [data-testid="stHeader"] {
        display: none !important;
    }

    [data-testid="stAppViewContainer"] {
        background:
            radial-gradient(circle at top, rgba(79, 70, 229, 0.12), transparent 28%),
            linear-gradient(180deg, var(--gm-bg) 0%, var(--gm-bg) 100%);
    }

    .block-container {
        max-width: 480px;
        padding: 18px 18px 28px;
    }

    @media (max-width: 420px) {
        .block-container {
            padding: 14px 14px 24px;
        }
    }

    .gm-login-shell {
        min-height: calc(100vh - 36px);
        display: flex;
        flex-direction: column;
    }

    .gm-login-card {
        background: var(--gm-surface);
        border: 1px solid var(--gm-border);
        border-radius: 28px;
        box-shadow: var(--gm-shadow-card);
        padding: 34px 22px 28px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 26px;
        backdrop-filter: blur(12px);
        margin-top: 32px;
    }

    .gm-logo {
        display: block;
        width: 100%;
        max-width: 320px;
        height: auto;
    }

    .gm-google-button-wrap {
        width: 100%;
        display: flex;
        justify-content: center;
    }

    .gsi-material-button {
        -moz-user-select: none;
        -webkit-user-select: none;
        -ms-user-select: none;
        -webkit-appearance: none;
        appearance: none;
        background-color: var(--gsi-bg);
        background-image: none;
        border: 1px solid var(--gsi-border);
        border-radius: 999px;
        box-sizing: border-box;
        color: var(--gsi-text);
        cursor: pointer;
        font-family: "Roboto", Arial, sans-serif;
        font-size: 13px;
        font-weight: 400;
        height: 42px;
        letter-spacing: 0.25px;
        outline: none;
        overflow: hidden;
        padding: 0 22px;
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        transition: box-shadow .18s ease, transform .18s ease, opacity .18s ease;
        vertical-align: middle;
        white-space: nowrap;
        width: min(100%, 322px);
        box-shadow: var(--gm-shadow-soft);
        text-decoration: none;
    }

    .gsi-material-button:hover {
        box-shadow: 0 14px 28px rgba(15, 23, 42, 0.18);
        transform: translateY(-1px);
    }

    .gsi-material-button:active {
        transform: translateY(1px);
    }

    .gsi-material-button.is-disabled {
        cursor: default;
        opacity: 0.58;
        pointer-events: none;
    }

    .gsi-material-button .gsi-material-button-state {
        transition: opacity .218s;
        background-color: currentColor;
        opacity: 0;
        position: absolute;
        inset: 0;
    }

    .gsi-material-button:hover .gsi-material-button-state {
        opacity: 0.08;
    }

    .gsi-material-button:focus .gsi-material-button-state,
    .gsi-material-button:focus-visible .gsi-material-button-state {
        opacity: 0.12;
    }

    .gsi-material-button:active .gsi-material-button-state {
        opacity: 0.16;
    }

    .gsi-material-button-content-wrapper {
        align-items: center;
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        height: 100%;
        gap: 10px;
        justify-content: center;
        position: relative;
        width: auto;
    }

    .gsi-material-button-icon {
        flex: 0 0 18px;
        height: 18px;
        min-width: 18px;
        width: 18px;
    }

    .gsi-material-button-icon-image {
        display: block;
        height: 18px;
        width: 18px;
    }

    .gsi-material-button-contents {
        flex-grow: 0;
        font-family: "Roboto", Arial, sans-serif;
        font-size: 13px;
        font-weight: 400;
        line-height: 20px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    @media (max-width: 420px) {
        .gm-login-card {
            border-radius: 24px;
            padding: 28px 18px 22px;
            gap: 22px;
            margin-top: 24px;
        }

        .gm-logo {
            max-width: 280px;
        }
    }
</style>

<section class="gm-login-shell">
    <div class="gm-login-card">
        <img
            class="gm-logo"
            src="{{LOGO_DATA_URI}}"
            alt="IDE"
        />

        <div class="gm-google-button-wrap">
            <a
                href="{{GOOGLE_BUTTON_HREF}}"
                class="gsi-material-button{{GOOGLE_BUTTON_CLASS}}"
                target="_self"
                rel="noopener noreferrer"
                aria-label="Continuar com Google"
            >
                <div class="gsi-material-button-state"></div>
                <div class="gsi-material-button-content-wrapper">
                    <div class="gsi-material-button-icon">
                        <img
                            class="gsi-material-button-icon-image"
                            src="{{GOOGLE_ICON_DATA_URI}}"
                            alt=""
                        />
                    </div>
                    <span class="gsi-material-button-contents">Continuar com Google</span>
                    <span style="display: none;">Continuar com Google</span>
                </div>
            </a>
        </div>
    </div>
</section>
