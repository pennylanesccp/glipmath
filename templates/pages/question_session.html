<style>
    :root {
        --gm-bg: #f8fafc;
        --gm-surface: #ffffff;
        --gm-surface-soft: #ffffff;
        --gm-primary: #4f46e5;
        --gm-primary-strong: #4338ca;
        --gm-primary-light: #eef2ff;
        --gm-text-main: #0f172a;
        --gm-text-secondary: #475569;
        --gm-border: #e2e8f0;
        --gm-border-strong: #cbd5e1;
        --gm-shadow-soft: 0 8px 30px rgba(15, 23, 42, 0.06);
        --gm-shadow-card: 0 20px 48px rgba(15, 23, 42, 0.08);

        --gm-success: #16a34a;
        --gm-success-bg: #f0fdf4;
        --gm-success-border: #bbf7d0;

        --gm-error: #dc2626;
        --gm-error-bg: #fef2f2;
        --gm-error-border: #fecaca;

        --gm-chip-fire: #f97316;
        --gm-chip-podium: #eab308;
    }

    [data-testid="stSidebar"],
    [data-testid="collapsedControl"],
    [data-testid="stToolbar"],
    [data-testid="stStatusWidget"],
    [data-testid="stHeader"] {
        display: none !important;
    }

    [data-testid="stAppViewContainer"] {
        background:
            radial-gradient(circle at top, rgba(79, 70, 229, 0.12), transparent 28%),
            linear-gradient(180deg, var(--gm-bg) 0%, var(--gm-bg) 100%);
    }

    .block-container {
        max-width: 480px;
        padding: 18px 18px 28px;
    }

    .gm-page {
        min-height: calc(100vh - 40px);
    }

    .gm-topbar {
        align-items: center;
        display: flex;
        gap: 12px;
        justify-content: flex-start;
        margin-bottom: 10px;
        position: sticky;
        top: 0;
        z-index: 20;
        padding-top: 4px;
        background: linear-gradient(to bottom, var(--gm-bg) 78%, transparent);
    }

    .gm-subject-menu {
        min-width: 0;
        position: relative;
        width: min(180px, 100%);
    }

    .gm-subject-menu summary {
        align-items: center;
        background: var(--gm-surface);
        border: 1px solid var(--gm-border);
        border-radius: 999px;
        box-shadow: var(--gm-shadow-soft);
        color: var(--gm-text-main);
        cursor: pointer;
        display: flex;
        font-size: 15px;
        font-weight: 700;
        justify-content: space-between;
        list-style: none;
        min-height: 42px;
        padding: 0 14px 0 16px;
        user-select: none;
    }

    .gm-subject-menu summary::-webkit-details-marker {
        display: none;
    }

    .gm-subject-chevron {
        color: var(--gm-text-secondary);
        flex: 0 0 auto;
        height: 14px;
        margin-left: 10px;
        width: 14px;
    }

    .gm-subject-panel {
        background: var(--gm-surface);
        border: 1px solid var(--gm-border);
        border-radius: 18px;
        box-shadow: var(--gm-shadow-card);
        display: flex;
        flex-direction: column;
        gap: 2px;
        left: 0;
        margin-top: 8px;
        overflow: hidden;
        position: absolute;
        right: 0;
        z-index: 30;
    }

    .gm-subject-option,
    .gm-subject-option:visited {
        color: var(--gm-text-secondary);
        padding: 12px 14px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        transition: background 0.18s ease, color 0.18s ease;
    }

    .gm-subject-option:hover,
    .gm-subject-option.is-active {
        background: var(--gm-primary-light);
        color: var(--gm-primary-strong);
    }

    .gm-meta-row {
        align-items: center;
        display: flex;
        gap: 12px;
        justify-content: space-between;
        margin-bottom: 18px;
    }

    .gm-chip-group {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        min-width: 0;
    }

    .gm-chip {
        align-items: center;
        background: var(--gm-surface);
        border: 1px solid var(--gm-border);
        border-radius: 999px;
        box-shadow: var(--gm-shadow-soft);
        color: var(--gm-text-main);
        display: inline-flex;
        font-size: 13px;
        font-weight: 800;
        gap: 7px;
        min-height: 36px;
        padding: 6px 12px;
        white-space: nowrap;
    }

    .gm-chip img {
        display: block;
        height: 16px;
        width: 16px;
    }

    .gm-inline-timer-frame {
        display: inline-flex;
    }

    .gm-inline-timer-chip {
        align-items: center;
        background: #eff6ff;
        border: 1px solid #bfdbfe;
        border-radius: 999px;
        box-sizing: border-box;
        color: #2563eb;
        display: inline-flex;
        gap: 8px;
        height: 36px;
        justify-content: center;
        min-width: 108px;
        padding: 0 12px;
        white-space: nowrap;
        width: 108px;
    }

    .gm-inline-timer-icon {
        display: block;
        flex: 0 0 auto;
        height: 16px;
        width: 16px;
    }

    .gm-inline-timer-value {
        font-size: 13px;
        font-weight: 800;
    }

    .gm-inline-timer-pulse {
        background: currentColor;
        border-radius: 999px;
        display: block;
        height: 8px;
        width: 8px;
    }

    .gm-logout-link,
    .gm-logout-link:visited {
        color: var(--gm-text-secondary);
        flex: 0 0 auto;
        font-size: 13px;
        font-weight: 800;
        padding: 8px 0;
        text-decoration: none;
        white-space: nowrap;
    }

    .gm-question-card {
        background: var(--gm-surface);
        border: 1px solid var(--gm-border);
        border-radius: 24px;
        box-shadow: var(--gm-shadow-card);
        margin-bottom: 20px;
        padding: 28px 24px;
    }

    .gm-question-statement {
        color: var(--gm-text-main);
        font-size: 18px;
        font-weight: 500;
        line-height: 1.65;
    }

    .gm-question-statement > :first-child,
    .gm-option-text > :first-child,
    .gm-option-explanation > :first-child {
        margin-top: 0;
    }

    .gm-question-statement > :last-child,
    .gm-option-text > :last-child,
    .gm-option-explanation > :last-child {
        margin-bottom: 0;
    }

    .gm-question-statement p,
    .gm-question-statement ul,
    .gm-question-statement ol,
    .gm-option-text p,
    .gm-option-text ul,
    .gm-option-text ol,
    .gm-option-explanation p,
    .gm-option-explanation ul,
    .gm-option-explanation ol {
        margin: 0 0 10px;
    }

    .gm-question-statement pre,
    .gm-option-text pre,
    .gm-option-explanation pre {
        background: #0f172a;
        border-radius: 16px;
        color: #e2e8f0;
        margin: 10px 0;
        overflow-x: auto;
        padding: 14px 16px;
        white-space: pre-wrap;
    }

    .gm-question-statement code,
    .gm-option-text code,
    .gm-option-explanation code {
        background: #eef2ff;
        border-radius: 8px;
        color: var(--gm-primary-strong);
        font-family: "Consolas", "Courier New", monospace;
        font-size: 0.94em;
        padding: 2px 6px;
    }

    .gm-question-statement pre code,
    .gm-option-text pre code,
    .gm-option-explanation pre code {
        background: transparent;
        color: inherit;
        padding: 0;
    }

    .gm-options {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .gm-option,
    .gm-option:visited {
        background: var(--gm-surface);
        border: 2px solid var(--gm-border);
        border-radius: 16px;
        color: inherit;
        display: flex;
        gap: 16px;
        overflow: hidden;
        padding: 18px 20px;
        position: relative;
        text-decoration: none;
        transition: transform 0.18s ease, border-color 0.22s ease, background 0.22s ease;
    }

    .gm-option:hover {
        transform: translateY(-1px);
    }

    .gm-option-radio {
        align-items: center;
        border: 2px solid var(--gm-border-strong);
        border-radius: 50%;
        display: inline-flex;
        flex: 0 0 auto;
        height: 24px;
        justify-content: center;
        margin-top: 1px;
        width: 24px;
    }

    .gm-option-radio::after {
        background: var(--gm-primary);
        border-radius: 50%;
        content: "";
        height: 10px;
        transform: scale(0);
        transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        width: 10px;
    }

    .gm-option-content {
        display: flex;
        flex: 1 1 auto;
        flex-direction: column;
        gap: 10px;
        min-width: 0;
    }

    .gm-option-text {
        color: var(--gm-text-secondary);
        font-size: 16px;
        font-weight: 600;
        line-height: 1.45;
    }

    .gm-option-explanation {
        border-top: 1px solid rgba(148, 163, 184, 0.18);
        color: var(--gm-text-secondary);
        font-size: 14px;
        line-height: 1.55;
        padding-top: 10px;
    }

    .gm-option--selected {
        background: var(--gm-primary-light);
        border-color: var(--gm-primary);
    }

    .gm-option--selected .gm-option-radio {
        border-color: var(--gm-primary);
    }

    .gm-option--selected .gm-option-radio::after {
        transform: scale(1);
    }

    .gm-option--selected .gm-option-text {
        color: var(--gm-primary-strong);
    }

    .gm-option--correct {
        background: var(--gm-success-bg);
        border-color: var(--gm-success-border);
    }

    .gm-option--correct .gm-option-radio {
        border-color: var(--gm-success);
    }

    .gm-option--correct .gm-option-radio::after {
        background: var(--gm-success);
        transform: scale(1);
    }

    .gm-option--correct .gm-option-text,
    .gm-option--correct .gm-option-explanation {
        color: var(--gm-success);
    }

    .gm-option--correct .gm-option-text {
        font-weight: 800;
    }

    .gm-option--wrong,
    .gm-option--wrong-selected {
        background: var(--gm-error-bg);
        border-color: var(--gm-error-border);
    }

    .gm-option--neutral {
        background: var(--gm-surface);
        border-color: var(--gm-border);
    }

    .gm-option--neutral .gm-option-radio {
        border-color: var(--gm-border-strong);
    }

    .gm-option--wrong .gm-option-text,
    .gm-option--wrong .gm-option-explanation,
    .gm-option--wrong-selected .gm-option-text,
    .gm-option--wrong-selected .gm-option-explanation {
        color: var(--gm-error);
    }

    .gm-option--neutral .gm-option-text,
    .gm-option--neutral .gm-option-explanation {
        color: var(--gm-text-secondary);
    }

    .gm-option--wrong .gm-option-text,
    .gm-option--wrong-selected .gm-option-text {
        font-weight: 800;
    }

    .gm-option--wrong-selected .gm-option-radio {
        border-color: var(--gm-error);
    }

    .gm-option--wrong-selected .gm-option-radio::after {
        background: var(--gm-error);
        transform: scale(1);
    }

    .gm-bottom-action {
        background: linear-gradient(to top, var(--gm-bg) 72%, transparent);
        bottom: 0;
        margin-top: 18px;
        padding: 16px 0 10px;
        position: sticky;
    }

    .gm-bottom-action-row {
        align-items: center;
        display: flex;
        gap: 16px;
        justify-content: space-between;
    }

    .gm-link-button {
        border-radius: 16px;
        display: inline-flex;
        font-size: 16px;
        font-weight: 800;
        justify-content: center;
        min-height: 54px;
        padding: 16px 18px;
        text-decoration: none;
    }

    .gm-link-button--skip {
        color: var(--gm-text-secondary);
        min-height: auto;
        padding: 8px 4px;
    }

    .gm-link-button--primary {
        background: var(--gm-primary-strong);
        box-shadow: 0 8px 20px -6px rgba(79, 70, 229, 0.4);
        color: #ffffff;
        flex: 1 1 auto;
    }

    .gm-link-button--primary.is-disabled {
        background: #cbd5e1;
        box-shadow: none;
        color: #f8fafc;
        pointer-events: none;
    }

    .gm-result-card {
        align-items: center;
        background: var(--gm-error-bg);
        border: 1px solid var(--gm-error-border);
        border-radius: 16px;
        box-shadow: var(--gm-shadow-soft);
        color: var(--gm-error);
        display: inline-flex;
        flex: 0 0 auto;
        font-size: 15px;
        font-weight: 800;
        min-height: 44px;
        padding: 10px 14px;
    }

    .gm-result-card--correct {
        background: var(--gm-success-bg);
        border-color: var(--gm-success-border);
        color: var(--gm-success);
    }

    .gm-info-card {
        background: var(--gm-surface);
        border: 1px solid var(--gm-border);
        border-radius: 18px;
        box-shadow: var(--gm-shadow-soft);
        color: var(--gm-text-secondary);
        font-size: 15px;
        line-height: 1.55;
        padding: 18px;
    }

    @media (max-width: 420px) {
        .block-container {
            padding: 14px 14px 24px;
        }

        .gm-question-card {
            border-radius: 22px;
            margin-bottom: 16px;
            padding: 24px 20px;
        }

        .gm-question-statement {
            font-size: 17px;
        }

        .gm-option,
        .gm-option:visited {
            padding: 16px;
        }

        .gm-option-text,
        .gm-option-explanation {
            font-size: 15px;
        }

        .gm-chip {
            font-size: 12px;
            min-height: 34px;
            padding: 6px 10px;
        }

        .gm-subject-menu {
            width: min(160px, 100%);
        }

        .gm-meta-row {
            align-items: flex-start;
            flex-direction: column;
        }

        .gm-logout-link {
            padding-top: 0;
        }
    }
</style>

<section class="gm-page">
    <div class="gm-topbar">
        <details class="gm-subject-menu">
            <summary>
                <span>{{CURRENT_SUBJECT_LABEL}}</span>
                <svg class="gm-subject-chevron" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
            </summary>
            <div class="gm-subject-panel">
                {{SUBJECT_OPTIONS_HTML}}
            </div>
        </details>
    </div>

    <div class="gm-meta-row">
        <div class="gm-chip-group">
            <div class="gm-chip">
                <img src="{{FIRE_ICON_DATA_URI}}" alt="" aria-hidden="true" />
                <span>{{STREAK_TEXT}}</span>
            </div>

            <div class="gm-chip">
                <img src="{{PODIUM_ICON_DATA_URI}}" alt="" aria-hidden="true" />
                <span>{{RANK_TEXT}}</span>
            </div>

            <div class="gm-inline-timer-frame">
                {{TIMER_HTML}}
            </div>
        </div>

        <a
            href="{{LOGOUT_HREF}}"
            class="gm-logout-link"
            target="_self"
            rel="noopener noreferrer"
        >
            Sair
        </a>
    </div>

    <article class="gm-question-card">
        <div class="gm-question-statement">{{QUESTION_STATEMENT_HTML}}</div>
    </article>

    <section class="gm-options">
        {{ALTERNATIVES_HTML}}
    </section>

    {{BOTTOM_ACTION_HTML}}
</section>
